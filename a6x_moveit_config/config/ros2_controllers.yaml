# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    finger_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - shoulder_yaw_joint
      - arm_roll_joint
      - forearm_roll_joint
      - lower_wrist_roll_joint
      - upper_wrist_pitch_joint
      - palm_roll_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
finger_controller:
  ros__parameters:
    joint: left_finger_prismatic_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    goal_tolerance: 0.01
    max_effort: 10.0
    allow_stalling: true
    stall_timeout: 2.0
    stall_velocity_threshold: 0.001
